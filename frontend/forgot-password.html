<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <link rel="icon" type="image/webp" href="/assets/images/favicon.webp">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass-nav sticky-top">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center text-white" href="/">
        <img src="/assets/images/Logo.webp" alt="Trackify Logo" style="height: 32px; width: auto;">
      </a>
    </div>
  </nav>

  <!-- Forgot Password Form Container -->
  <main class="container my-5 py-5 animate-fade-in-up">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card border-glass p-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Reset Password</h1>
            <p class="text-secondary small">Enter your email address and we'll help you configure a new password.</p>
          </div>

          <div id="alertContainer"></div>

          <form id="forgotForm">
            <!-- Email Address -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <label for="email">Email Address</label>
            </div>

            <!-- OTP & New Password Block (Hidden initially) -->
            <div id="otpResetBlock" class="d-none">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="otpCode" placeholder="6-Digit OTP" pattern="[0-9]{6}" maxlength="6">
                <label for="otpCode">Enter 6-Digit OTP</label>
                <div class="form-text text-secondary mt-1" style="font-size: 0.75rem;">
                  Note: Please check your <strong>spam or junk folder</strong> if you do not receive the email in a few minutes.
                </div>
              </div>
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="newPassword" placeholder="New Password">
                <label for="newPassword">New Password</label>
              </div>
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password">
                <label for="confirmPassword">Confirm Password</label>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-glow w-100 py-3 mb-3" id="submitBtn">Send Reset OTP</button>
          </form>

          <div class="text-center mt-3">
            <a href="/login" class="link-secondary text-decoration-none small fw-semibold">&larr; Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
  <script>
    let otpSent = false;

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const alertContainer = document.getElementById('alertContainer');
      const otpResetBlock = document.getElementById('otpResetBlock');
      const otpCodeInput = document.getElementById('otpCode');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      
      if (!otpSent) {
        // Send OTP
        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending OTP...';
        alertContainer.innerHTML = '';

        const response = await apiCall('/api/auth/otp/send', {
          method: 'POST',
          body: { email, purpose: 'forgot' }
        });

        submitBtn.disabled = false;
        if (response.success) {
          otpSent = true;
          document.getElementById('email').readOnly = true;
          otpResetBlock.classList.remove('d-none');
          otpCodeInput.required = true;
          newPasswordInput.required = true;
          confirmPasswordInput.required = true;
          
          submitBtn.innerText = 'Verify & Reset Password';
          showAlert(response.message, 'success');
        } else {
          submitBtn.innerText = 'Send Reset OTP';
          showAlert(response.message || 'Failed to send OTP code.', 'danger');
        }
      } else {
        // Verify OTP and reset password
        const otp = otpCodeInput.value;
        const password = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password !== confirmPassword) {
          showAlert('Passwords do not match.', 'danger');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = 'Resetting Password...';

        const response = await apiCall('/api/auth/otp/reset', {
          method: 'POST',
          body: { email, otp, password, confirmPassword }
        });

        submitBtn.disabled = false;
        if (response.success) {
          showAlert(response.message + ' Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = '/login';
          }, 1500);
        } else {
          submitBtn.innerText = 'Verify & Reset Password';
          showAlert(response.message || 'Verification or password update failed.', 'danger');
        }
      }
    });

    function showAlert(message, type) {
      const container = document.getElementById('alertContainer');
      container.innerHTML = `
        <div class="alert alert-${type} px-3 py-2 fs-7" role="alert">
          ${message}
        </div>
      `;
    }
  </script>
</body>
</html>
