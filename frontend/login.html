<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/webp" href="/assets/images/favicon.webp">
    <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (localStorage.getItem('sidebar-collapsed') === 'true') {
        document.documentElement.classList.add('sidebar-collapsed');
      }
    })();
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass-nav">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center text-white" href="/">
        <img src="/assets/images/logo_light.webp" alt="Trackify Logo" style="height: 32px; width: auto;">
      </a>
    </div>
  </nav>

  <!-- Login Form Container -->
  <main class="container my-5 py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 animate-fade-in-up">
        <div class="glass-card border-glass shadow-lg">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
            <p class="text-secondary">Log in to manage your attendance records.</p>
          </div>

          <form id="loginForm">
            <!-- Email Address -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <label for="email">Email Address</label>
            </div>

            <!-- Password Form Block -->
            <div id="passwordFormBlock">
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password">Password</label>
              </div>
              <div class="text-end mb-4">
                <a href="/forgot-password" class="text-secondary small text-decoration-none hover-link" style="font-size: 0.8rem; font-weight: 500;">Forgot Password?</a>
              </div>
            </div>

            <!-- OTP Form Block -->
            <div id="otpFormBlock" class="d-none">
              <div class="form-floating mb-3 d-none" id="otpCodeInputContainer">
                <input type="text" class="form-control" id="otpCode" placeholder="6-Digit OTP" pattern="[0-9]{6}" maxlength="6">
                <label for="otpCode">Enter 6-Digit OTP</label>
                <div class="form-text text-secondary mt-1" style="font-size: 0.75rem;">
                  Note: Please check your <strong>spam or junk folder</strong> if you do not receive the email in a few minutes.
                </div>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="btn btn-glow w-100 py-3 mb-3">Log In</button>

            <!-- Toggle Mode link -->
            <div class="text-center mb-2">
              <a href="#" id="toggleModeBtn" class="text-primary small text-decoration-none fw-semibold">Log In with OTP</a>
            </div>
          </form>

          <div class="text-center mt-3" id="signup-option-container">
            <span class="text-secondary">Need an account? Please contact your administrator.</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script>
    let isOtpMode = false;
    let otpSent = false;

    // Check URL parameters for status alerts
    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get('msg');
    if (msg === 'registration_disabled') {
      showAlert('Public self-registration is currently disabled.', 'warning');
    } else if (msg === 'pending_approval') {
      showAlert('Your registration request is pending administrator review.', 'info');
    }

    // Check registration status dynamically
    async function checkRegistration() {
      const response = await apiCall('/api/auth/registration-status');
      if (response.success && response.allowSelfRegistration) {
        document.getElementById('signup-option-container').innerHTML = `
          <span class="text-secondary">Need an account? <a href="/register" class="text-primary text-decoration-none fw-semibold">Sign Up</a></span>
        `;
      }
    }
    checkRegistration();

    // Toggle Login Mode
    const toggleModeBtn = document.getElementById('toggleModeBtn');
    const passwordFormBlock = document.getElementById('passwordFormBlock');
    const otpFormBlock = document.getElementById('otpFormBlock');
    const passwordInput = document.getElementById('password');
    const otpCodeInputContainer = document.getElementById('otpCodeInputContainer');
    const otpCodeInput = document.getElementById('otpCode');
    const submitBtn = document.getElementById('submitBtn');

    toggleModeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      isOtpMode = !isOtpMode;
      otpSent = false;
      otpCodeInputContainer.classList.add('d-none');
      otpCodeInput.required = false;
      otpCodeInput.value = '';

      if (isOtpMode) {
        passwordFormBlock.classList.add('d-none');
        otpFormBlock.classList.remove('d-none');
        passwordInput.required = false;
        toggleModeBtn.innerText = 'Log In with Password';
        submitBtn.innerText = 'Send Verification Code (OTP)';
      } else {
        passwordFormBlock.classList.remove('d-none');
        otpFormBlock.classList.add('d-none');
        passwordInput.required = true;
        toggleModeBtn.innerText = 'Log In with OTP';
        submitBtn.innerText = 'Log In';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;

      if (!isOtpMode) {
        // Password login flow
        const password = passwordInput.value;
        submitBtn.disabled = true;
        submitBtn.innerText = 'Logging In...';

        const response = await apiCall('/api/auth/login', {
          method: 'POST',
          body: { email, password }
        });

        if (response.success) {
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = response.redirectUrl;
          }, 1000);
        } else {
          showAlert(response.message, 'danger');
          submitBtn.disabled = false;
          submitBtn.innerText = 'Log In';
        }
      } else {
        // OTP login flow
        if (!otpSent) {
          // Send OTP
          submitBtn.disabled = true;
          submitBtn.innerText = 'Sending Code...';

          const response = await apiCall('/api/auth/otp/send', {
            method: 'POST',
            body: { email, purpose: 'login' }
          });

          if (response.success) {
            otpSent = true;
            otpCodeInputContainer.classList.remove('d-none');
            otpCodeInput.required = true;
            otpCodeInput.focus();
            showAlert(response.message, 'success');
            submitBtn.disabled = false;
            submitBtn.innerText = 'Verify & Log In';
          } else {
            showAlert(response.message, 'danger');
            submitBtn.disabled = false;
            submitBtn.innerText = 'Send Verification Code (OTP)';
          }
        } else {
          // Verify OTP
          const otp = otpCodeInput.value;
          submitBtn.disabled = true;
          submitBtn.innerText = 'Verifying Code...';

          const response = await apiCall('/api/auth/otp/login', {
            method: 'POST',
            body: { email, otp }
          });

          if (response.success) {
            showAlert('Verification successful! Redirecting...', 'success');
            setTimeout(() => {
              window.location.href = response.redirectUrl;
            }, 1000);
          } else {
            showAlert(response.message, 'danger');
            submitBtn.disabled = false;
            submitBtn.innerText = 'Verify & Log In';
          }
        }
      }
    });
  </script>
</body>
</html>
