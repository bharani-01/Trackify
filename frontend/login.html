<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass-nav">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center text-white" href="/">
        <span class="fs-3 fw-bold gradient-accent-text" id="logo">Trackify</span>
      </a>
    </div>
  </nav>

  <!-- Login Form Container -->
  <main class="container my-5 py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 animate-fade-in-up">
        <div class="glass-card border-glass shadow-lg">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
            <p class="text-secondary">Log in to manage your attendance records.</p>
          </div>

          <form id="loginForm">
            <!-- Email Address -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <label for="email">Email Address</label>
            </div>

            <!-- Password -->
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="password" placeholder="Password" required>
              <label for="password">Password</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-glow w-100 py-3 mb-3">Log In</button>
          </form>

          <div class="text-center mt-3">
            <span class="text-secondary">Need an account? Please contact your administrator.</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerText = 'Logging In...';

      const response = await apiCall('/api/auth/login', {
        method: 'POST',
        body: { email, password }
      });

      if (response.success) {
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = response.redirectUrl;
        }, 1000);
      } else {
        showAlert(response.message, 'danger');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Log In';
      }
    });
  </script>
</body>
</html>
