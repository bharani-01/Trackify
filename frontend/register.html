<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Sign Up - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <link rel="icon" type="image/webp" href="/assets/images/favicon.webp">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass-nav">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center text-white" href="/">
        <img src="/assets/images/Logo.webp" alt="Trackify Logo" style="height: 32px; width: auto;">
      </a>
    </div>
  </nav>

  <!-- Register Form Container -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 animate-fade-in-up">
        <div class="glass-card border-glass shadow-lg p-4">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Create Student Account</h1>
            <p class="text-secondary">Self-registered profiles require administrator approval.</p>
          </div>

          <div id="alertContainer"></div>

          <form id="registerForm">
            <!-- Full Name -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="name" placeholder="Full Name" required>
              <label for="name">Full Name</label>
            </div>

            <!-- Email Address -->
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <label for="email">Email Address</label>
            </div>

            <!-- Register Number -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control text-uppercase" id="regNumber" placeholder="Register Number" required>
              <label for="regNumber">Register Number (e.g. VERIFY001)</label>
            </div>

            <!-- Department dropdown -->
            <div class="form-floating mb-3">
              <select class="form-select bg-white text-dark" id="department" required>
                <option value="" disabled selected>Loading departments...</option>
              </select>
              <label for="department">Department</label>
            </div>

            <!-- Semester dropdown -->
            <div class="form-floating mb-3">
              <select class="form-select bg-white text-dark" id="semester" required>
                <option value="" disabled selected>Select Semester</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
              </select>
              <label for="semester">Semester</label>
            </div>

            <!-- Password -->
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" placeholder="Password" required minlength="6">
              <label for="password">Password (min 6 characters)</label>
            </div>

            <!-- Confirm Password -->
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
              <label for="confirmPassword">Confirm Password</label>
            </div>

            <!-- Terms & Privacy Acceptance -->
            <div class="mb-4 p-3" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
              <div class="form-check d-flex align-items-start gap-2" style="margin: 0;">
                <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="acceptTerms">
                <label class="form-check-label" for="acceptTerms" style="font-size: 0.85rem; color: #475569; line-height: 1.6;">
                  I have read and agree to the
                  <a href="/terms" target="_blank" class="fw-semibold text-decoration-none" style="color: #2563eb;">Terms &amp; Conditions</a>
                  and
                  <a href="/privacy-policy" target="_blank" class="fw-semibold text-decoration-none" style="color: #2563eb;">Privacy Policy</a>
                  of Trackify.
                </label>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-glow w-100 py-3 mb-3" id="submitBtn">Submit Request</button>
          </form>

          <div id="successArea" class="d-none text-center py-4">
            <div class="mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user-check"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
            </div>
            <h3 class="h5 fw-bold text-primary mb-2">Request Submitted!</h3>
            <p class="text-secondary small mb-4" id="successMsg">Your registration has been received and is pending admin approval.</p>
            <a href="/login?msg=pending_approval" class="btn btn-glow w-100 py-2.5">Back to Login</a>
          </div>

          <div class="text-center mt-2">
            <a href="/login" class="link-secondary text-decoration-none small fw-semibold">&larr; Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
  <script>
    // Load departments dynamically
    async function loadDepartments() {
      const select = document.getElementById('department');
      const response = await apiCall('/api/departments');
      if (response.success && response.departments) {
        select.innerHTML = '<option value="" disabled selected>Select Department</option>';
        response.departments.forEach(dept => {
          const opt = document.createElement('option');
          opt.value = dept.code;
          opt.textContent = `${dept.name} (${dept.code})`;
          select.appendChild(opt);
        });
      } else {
        select.innerHTML = '<option value="" disabled>Failed to load departments</option>';
      }
    }
    loadDepartments();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const register_number = document.getElementById('regNumber').value.trim();
      const department = document.getElementById('department').value;
      const semester = document.getElementById('semester').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const acceptTerms = document.getElementById('acceptTerms').checked;
      const alertContainer = document.getElementById('alertContainer');
      const submitBtn = document.getElementById('submitBtn');

      if (!acceptTerms) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
            You must accept the Terms &amp; Conditions and Privacy Policy to register.
          </div>
        `;
        return;
      }

      if (password !== confirmPassword) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
            Passwords do not match.
          </div>
        `;
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Submitting Request...';
      alertContainer.innerHTML = '';

      const response = await apiCall('/api/auth/register', {
        method: 'POST',
        body: { name, email, register_number, department, semester, password }
      });

      if (response.success) {
        document.getElementById('registerForm').classList.add('d-none');
        document.getElementById('successArea').classList.remove('d-none');
        document.getElementById('successMsg').innerText = response.message;
      } else {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Submit Request';
        alertContainer.innerHTML = `
          <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
            ${response.message || 'Registration request failed.'}
          </div>
        `;
      }
    });
  </script>
</body>
</html>
