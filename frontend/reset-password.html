<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <link rel="icon" type="image/webp" href="/assets/images/favicon.webp">
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass-nav sticky-top">
    <div class="container py-2">
      <a class="navbar-brand d-flex align-items-center text-white" href="/">
        <img src="/assets/images/logo_light.webp" alt="Trackify Logo" style="height: 32px; width: auto;">
      </a>
    </div>
  </nav>

  <!-- Reset Password Form Container -->
  <main class="container my-5 py-5 animate-fade-in-up">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="glass-card border-glass p-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold mb-2">Create New Password</h1>
            <p class="text-secondary small">Define your new credentials to restore access to your account.</p>
          </div>

          <div id="alertContainer"></div>

          <form id="resetForm">
            <!-- Token Hidden field -->
            <input type="hidden" id="token">

            <!-- New Password -->
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="password" placeholder="New Password" required minlength="6">
              <label for="password">New Password (min 6 chars)</label>
            </div>

            <!-- Confirm Password -->
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
              <label for="confirmPassword">Confirm Password</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-glow w-100 py-3 mb-3" id="submitBtn">Update Password</button>
          </form>

          <div class="text-center mt-2">
            <a href="/login" class="link-secondary text-decoration-none small fw-semibold">&larr; Cancel and Log In</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/main.js"></script>
  <script>
    // Extract token parameter from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const alertContainer = document.getElementById('alertContainer');
    const submitBtn = document.getElementById('submitBtn');

    if (!token) {
      alertContainer.innerHTML = `
        <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
          Invalid or missing recovery token. Please request another password reset.
        </div>
      `;
      submitBtn.disabled = true;
    } else {
      document.getElementById('token').value = token;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const alertContainer = document.getElementById('alertContainer');
      
      if (password !== confirmPassword) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
            Passwords do not match. Please verify your entries.
          </div>
        `;
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Updating...';
      alertContainer.innerHTML = '';

      const response = await apiCall('/api/auth/reset-password', {
        method: 'POST',
        body: { token, password, confirmPassword }
      });

      if (response.success) {
        alertContainer.innerHTML = `
          <div class="alert alert-success px-3 py-2 fs-7" role="alert">
            Your password was updated successfully! Redirecting you to login...
          </div>
        `;
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);
      } else {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Update Password';
        alertContainer.innerHTML = `
          <div class="alert alert-danger px-3 py-2 fs-7" role="alert">
            ${response.message || 'Failed to update password.'}
          </div>
        `;
      }
    });
  </script>
</body>
</html>
