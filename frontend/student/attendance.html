  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"

  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <style>
    /* Premium style improvements for quick actions */
    .quick-date-btn {
      flex: 1;
      min-width: 90px;
      transition: all 80ms ease;
      font-size: 0.8rem !important;
    }

    .quick-date-btn.active {
      background: var(--primary) !important;
      border-color: var(--primary) !important;
      color: #ffffff !important;
    }

    .class-attendance-card {
      transition: background-color 80ms ease, border-color 80ms ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    @media (min-width: 768px) {
      .class-attendance-card {
        flex-direction: row !important;
        justify-content: space-between;
        align-items: center !important;
      }
    }

    .attendance-btn-group .btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
    }

    /* Mobile Responsive Optimizations for Attendance Logging */
    @media (max-width: 768px) {
      #quick-dates-container {
        width: 100%;
        display: flex;
        gap: 0.5rem !important;
      }

      .quick-date-btn {
        min-width: 0 !important;
        padding: 0.5rem 0.25rem !important;
      }

      .custom-date-container {
        width: 100%;
        justify-content: space-between;
        margin-top: 0.25rem;
      }

      .custom-date-container input {
        flex-grow: 1;
        max-width: 180px;
      }

      .attendance-btn-group {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.35rem !important;
        width: 100%;
        margin-top: 0.75rem;
        /* Spacing for Mark Attendance button group on mobile */
      }

      .attendance-btn-group .btn {
        padding: 0.5rem 0.1rem !important;
        font-size: 0.68rem !important;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-marked-container {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.75rem;
      }

      .status-marked-container .badge {
        flex-grow: 1;
        text-align: center;
        margin-right: 0.5rem;
      }
    }
  </style>

  <script>

      if (localStorage.getItem('sidebar-collapsed') === 'true') {

  <script>
    let currentSelectedDate = '';
    let daySlots = [];
    let currentDateHoliday = null;

    // Initialize dates
    const todayObj = new Date();
    const todayDateFormatted = getFormattedDateString(todayObj);
    currentSelectedDate = todayDateFormatted;

    function getFormattedDateString(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    // Render dynamic rolling days strip (Apple/Stripe style - Extended 15-Card Sliding Track)
    function renderRollingDaysStrip(centerDateStr) {
      const parts = centerDateStr.split('-');
      const centerDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      
      const container = document.getElementById('rolling-days-strip');
      if (!container) return;
      container.innerHTML = '';
      
      // Render 15 cards: centerDate - 7 to centerDate + 7
      for (let offset = -7; offset <= 7; offset++) {
        const current = new Date(centerDate);
        current.setDate(centerDate.getDate() + offset);
        
        const formattedDate = getFormattedDateString(current);
        const dayNum = current.getDate();
        
        const daysAbbrev = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const monthsAbbrev = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const dayName = daysAbbrev[current.getDay()];
        const monthName = monthsAbbrev[current.getMonth()];
        
        const isActive = offset === 0;
        const activeClass = isActive ? 'active-day-card' : '';
        const idAttr = isActive ? 'id="active-day-strip-card"' : '';
        
        container.innerHTML += `
          <button type="button" ${idAttr} class="day-strip-card ${activeClass} d-flex flex-column align-items-center justify-content-center" onclick="selectDateFromStrip('${formattedDate}')">
            <span class="day-month-lbl">${monthName}</span>
            <span class="day-num-lbl">${dayNum}</span>
            <span class="day-name-lbl">${dayName}</span>
          </button>
        `;
      }

      // Auto-scroll active day card smoothly to center
      setTimeout(() => {
        const activeCard = document.getElementById('active-day-strip-card');
        if (activeCard) {
          activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      }, 50);
    }

    async function selectDateFromStrip(dateStr) {
      currentSelectedDate = dateStr;
      document.getElementById('attendanceDateSelect').value = dateStr;
      renderRollingDaysStrip(dateStr);
      await fetchChecklist();
    }

    async function loadData() {
      // Set input element value
      document.getElementById('attendanceDateSelect').value = currentSelectedDate;
      // Render strip centered at today
      renderRollingDaysStrip(currentSelectedDate);

      // Fetch user profile session
      const meResult = await apiCall('/api/auth/me');
      if (meResult.success && meResult.user) {
        document.getElementById('user-header-name').innerText = meResult.user.name;
      } else {
        window.location.href = '/login';
        return;
      }

      await fetchChecklist();
    }

    // Load classes checklist based on selected date
    async function fetchChecklist() {
      const container = document.getElementById('today-schedule-container');
      const dParts = currentSelectedDate.split('-');
      const targetDate = new Date(parseInt(dParts[0], 10), parseInt(dParts[1], 10) - 1, parseInt(dParts[2], 10));

      const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const targetDayName = daysOfWeek[targetDate.getDay()];

      // Update date title inside status bar (if element exists)
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const dateTitleEl = document.getElementById('progress-date-title');
      if (dateTitleEl) {
        dateTitleEl.innerText = `${targetDayName}, ${months[targetDate.getMonth()]} ${targetDate.getDate()}, ${targetDate.getFullYear()}`;
      }

      // Fetch student's timetable schedule, adjustments, and log entries for the selected date
      const timetableRes = await apiCall('/api/timetable');
      const adjustmentsRes = await apiCall(`/api/timetable/adjustments?date=${currentSelectedDate}`);
      const logsRes = await apiCall(`/api/attendance?startDate=${currentSelectedDate}&endDate=${currentSelectedDate}`);

      if (timetableRes.success && adjustmentsRes.success && logsRes.success) {
        const rawSlots = timetableRes.timetable.filter(s => s.day === targetDayName);
        const dayLogs = logsRes.logs;
        const dayAdjustments = adjustmentsRes.adjustments;
        const holiday = logsRes.holiday; // Capture holiday from logs request
        currentDateHoliday = holiday;

        const holidayBannerContainer = document.getElementById('holiday-banner-container');
        if (holidayBannerContainer) {
          if (holiday) {
            holidayBannerContainer.innerHTML = `
              <div class="p-3.5 rounded-4 border border-info-subtle d-flex align-items-center gap-3 animate-fade-in-up" style="background: linear-gradient(135deg, var(--info-subtle), rgba(6, 182, 212, 0.05));">
                <div class="rounded-circle p-2 bg-info text-white d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px; flex-shrink: 0;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                    <path d="M8 14h8"></path>
                  </svg>
                </div>
                <div>
                  <h4 class="h6 fw-bold mb-1 text-info-emphasis">Holiday: ${holiday.name}</h4>
                  <p class="text-secondary small mb-0">Today is declared as a holiday by the administrator. Attendance logging is disabled.</p>
                </div>
              </div>
            `;
            holidayBannerContainer.style.display = 'block';
          } else {
            holidayBannerContainer.style.display = 'none';
            holidayBannerContainer.innerHTML = '';
          }
        }

        // Apply cohort adjustments to the template slots
        daySlots = [];
        rawSlots.forEach(slot => {
          const adj = dayAdjustments.find(a => a.period === slot.period && a.adjustment_type !== 'extra');
          if (adj) {
            if (adj.adjustment_type === 'cancel') {
              daySlots.push({
                ...slot,
                is_canceled: true
              });
            } else if (adj.adjustment_type === 'substitution') {
              daySlots.push({
                ...slot,
                subject_id: adj.adjusted_subject_id,
                subject_name: adj.adjusted_subject_name,
                subject_code: adj.adjusted_subject_code,
                color: adj.adjusted_subject_color || slot.color,
                is_substituted: true,
                original_subject_name: slot.subject_name
              });
            } else if (adj.adjustment_type === 'swap') {
              daySlots.push({
                ...slot,
                subject_id: adj.adjusted_subject_id,
                subject_name: adj.adjusted_subject_name,
                subject_code: adj.adjusted_subject_code,
                color: adj.adjusted_subject_color || slot.color,
                is_swapped: true,
                swap_period_details: adj.remarks
              });
            }
          } else {
            daySlots.push(slot);
          }
        });

        // Add extra class periods
        dayAdjustments.forEach(adj => {
          if (adj.adjustment_type === 'extra') {
            daySlots.push({
              id: null,
              subject_id: adj.adjusted_subject_id,
              subject_name: adj.adjusted_subject_name,
              subject_code: adj.adjusted_subject_code,
              color: adj.adjusted_subject_color || '#3b82f6',
              day: targetDayName,
              period: adj.period,
              start_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[0].trim() + ':00' : '00:00:00',
              end_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[1].trim() + ':00' : '00:00:00',
              room: 'TBA',
              is_extra: true
            });
          }
        });

        // Sort by period number
        daySlots.sort((a, b) => a.period - b.period);

        container.innerHTML = '';

        if (daySlots.length === 0 || holiday) {
          document.getElementById('bulk-actions-container').style.setProperty('display', 'none', 'important');
          if (daySlots.length === 0) {
            container.innerHTML = `
              <div class="text-center py-5">
                <h3 class="h6 fw-semibold text-secondary">No classes scheduled for this date</h3>
                <p class="text-muted small mb-0">Enjoy your day off or select another date.</p>
              </div>
            `;
            updateProgressBar(0, 0);
            return;
          }
        } else {
          // Show bulk actions container since there are slots and no holiday
          document.getElementById('bulk-actions-container').style.setProperty('display', 'flex', 'important');
        }

        let markedCount = 0;
        let activeTotal = 0;

        daySlots.forEach(slot => {
          const start = slot.start_time.substring(0, 5);
          const end = slot.end_time.substring(0, 5);

          if (slot.is_canceled) {
            container.innerHTML += `
              <div class="p-3 mb-3 rounded-4 border bg-light text-muted gap-3 class-attendance-card" style="border-left: 5px solid #e2e8f0 !important; text-decoration: line-through; opacity: 0.65;">
                <div class="d-flex justify-content-between align-items-center w-100 flex-wrap">
                  <div>
                    <span class="badge bg-secondary text-white px-2 py-0.5 fs-9 mb-1">Period ${slot.period}</span>
                    <h3 class="fs-6 fw-bold mb-1">${slot.subject_name} (${slot.subject_code})</h3>
                    <div class="text-secondary small">Time: ${start} - ${end} | Canceled Class</div>
                  </div>
                  <div class="text-start text-md-end mt-2 mt-md-0">
                    <span class="badge bg-danger-subtle text-danger border border-danger-subtle px-3 py-2 fs-7">CANCELED</span>
                  </div>
                </div>
              </div>
            `;
            return;
          }

          activeTotal++; // Only count non-canceled classes in checklist progress

          // Match log precisely by period
          const matchLog = dayLogs.find(l => {
            if (!l.remarks) return false;
            const parts = l.remarks.split(' ');
            return parts[0] === 'Period' && parts[1] === String(slot.period);
          });

          let statusAreaHtml = '';
          let cardBgStyle = '';
          let editIconHtml = '';

          if (holiday) {
            statusAreaHtml = `
              <span class="badge bg-info-subtle text-info border border-info-subtle px-3 py-2 fs-7">Holiday: ${holiday.name}</span>
            `;
          } else if (matchLog) {
            markedCount++;
            const logId = matchLog.id;
            const isPresent = matchLog.status === 'Present';
            const isAbsent = matchLog.status === 'Absent';
            const isOD = matchLog.status === 'On Duty';

            if (isPresent) cardBgStyle = 'background: rgba(16, 185, 129, 0.02);';
            else if (isAbsent) cardBgStyle = 'background: rgba(239, 68, 68, 0.02);';
            else if (isOD) cardBgStyle = 'background: rgba(37, 99, 235, 0.02);';

            editIconHtml = `
              <button type="button" onclick="enableCardEditMode('${slot.period}')" class="btn btn-sm text-secondary p-1 border-0 position-absolute top-0 end-0 m-3 edit-pencil-btn" title="Edit marking">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
            `;

            let badgeMarkup = '';
            if (isPresent) {
              badgeMarkup = `<span class="badge bg-success-subtle text-success border border-success-subtle px-3.5 py-2 fs-7 fw-bold" style="border-radius: 9999px;">✓ Present</span>`;
            } else if (isAbsent) {
              badgeMarkup = `<span class="badge bg-danger-subtle text-danger border border-danger-subtle px-3.5 py-2 fs-7 fw-bold" style="border-radius: 9999px;">✗ Absent</span>`;
            } else if (isOD) {
              badgeMarkup = `<span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3.5 py-2 fs-7 fw-bold" style="border-radius: 9999px;">ℹ On Duty</span>`;
            } else {
              badgeMarkup = `<span class="badge bg-secondary-subtle text-secondary border px-3.5 py-2 fs-7 fw-bold" style="border-radius: 9999px;">${matchLog.status}</span>`;
            }

            statusAreaHtml = `
              <div id="status-display-period-${slot.period}" class="d-flex align-items-center gap-2 flex-wrap justify-content-md-end me-md-4">
                ${badgeMarkup}
              </div>
              <div id="status-edit-period-${slot.period}" class="d-flex align-items-center gap-2 flex-wrap justify-content-md-end me-md-4" style="display: none !important;">
                <div class="apple-segmented-pill">
                  <button type="button" class="segmented-item ${isPresent ? 'active-present' : ''}" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'Present', '${logId}')">Present</button>
                  <button type="button" class="segmented-item ${isAbsent ? 'active-absent' : ''}" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'Absent', '${logId}')">Absent</button>
                  <button type="button" class="segmented-item ${isOD ? 'active-od' : ''}" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'On Duty', '${logId}')">OD</button>
                </div>
              </div>
            `;
          } else {
            statusAreaHtml = `
              <div class="d-flex align-items-center gap-2 flex-wrap justify-content-md-end">
                <div class="apple-segmented-pill">
                  <button type="button" class="segmented-item" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'Present')">Present</button>
                  <button type="button" class="segmented-item" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'Absent')">Absent</button>
                  <button type="button" class="segmented-item" onclick="handleSegmentClick(this, '${slot.subject_id}', '${slot.period}', 'On Duty')">OD</button>
                </div>
              </div>
            `;
          }

          let subLabel = '';
          if (slot.is_substituted) {
            subLabel = `<div class="text-warning small" style="font-size:0.75rem; font-weight: 500;">★ Substituted from ${slot.original_subject_name}</div>`;
          } else if (slot.is_swapped) {
            subLabel = `<div class="text-info small" style="font-size:0.75rem; font-weight: 500;">⇆ ${slot.swap_period_details}</div>`;
          } else if (slot.is_extra) {
            subLabel = `<div class="text-success small" style="font-size:0.75rem; font-weight: 500;">✚ Extra Period</div>`;
          }

          container.innerHTML += `
            <div class="p-3 mb-3 rounded-4 border bg-white shadow-sm gap-3 class-attendance-card position-relative" style="${cardBgStyle}">
              ${editIconHtml}
              <div>
                <span class="badge bg-secondary-subtle text-secondary border px-2 py-0.5 fs-9 mb-1 fw-semibold">Period ${slot.period}</span>
                <h3 class="fs-6 fw-bold mb-1">${slot.subject_name} <span class="text-secondary small font-monospace">(${slot.subject_code})</span></h3>
                <div class="text-secondary small mb-1">Time: ${start} - ${end} ${slot.room ? `| Room: ${slot.room}` : ''}</div>
                ${subLabel}
              </div>
              <div class="text-start text-md-end mt-2 mt-md-0">
                ${statusAreaHtml}
              </div>
            </div>
          `;
        });

        updateProgressBar(markedCount, activeTotal);
      } else {
        const holidayBannerContainer = document.getElementById('holiday-banner-container');
        if (holidayBannerContainer) {
          holidayBannerContainer.style.display = 'none';
          holidayBannerContainer.innerHTML = '';
        }
        currentDateHoliday = null;
        container.innerHTML = '<div class="text-danger p-3 text-center">Failed to load schedule checklist.</div>';
      }
    }

    function updateProgressBar(marked, total) {
      const percentage = total > 0 ? Math.round((marked / total) * 100) : 0;
      const bar = document.getElementById('checklist-progress-bar');
      if (bar) {
        bar.style.width = `${percentage}%`;
        bar.setAttribute('aria-valuenow', percentage);
      }
      const pct = document.getElementById('progress-percentage');
      if (pct) pct.innerText = `${percentage}%`;
      const txt = document.getElementById('progress-text');
      if (txt) txt.innerText = `You have marked ${marked} of ${total} classes scheduled for this date.`;
    }

    async function onDateChanged(dateVal) {
      if (!dateVal) return;
      currentSelectedDate = dateVal;
      renderRollingDaysStrip(dateVal);
      await fetchChecklist();
    }

    async function markAll(status) {
      if (currentDateHoliday) {
        showAlert('Attendance logging is disabled on holidays.', 'warning');
        return;
      }
      if (!confirm(`Are you sure you want to mark all scheduled classes on this day as ${status}?`)) {
        return;
      }
      
      const activeSlots = daySlots.filter(s => !s.is_canceled);
      if (activeSlots.length === 0) return;
      
      showAlert(`Logging bulk ${status} markings, please wait...`, 'info');
      
      const promises = activeSlots.map(slot => {
        return apiCall('/api/attendance', {
          method: 'POST',
          body: {
            subject_id: slot.subject_id,
            date: currentSelectedDate,
            status: status,
            remarks: `Period ${slot.period}`
          }
        });
      });
      
      const results = await Promise.all(promises);
      const successfulCount = results.filter(r => r.success).length;
      
      showAlert(`Successfully marked ${successfulCount} classes as ${status}`, 'success');
      await fetchChecklist();
    }

    function enableCardEditMode(period) {
      const displayDiv = document.getElementById(`status-display-period-${period}`);
      const editDiv = document.getElementById(`status-edit-period-${period}`);
      if (displayDiv && editDiv) {
        displayDiv.style.setProperty('display', 'none', 'important');
        editDiv.style.setProperty('display', 'flex', 'important');
      }
    }

    async function handleSegmentClick(btnEl, subjectId, period, status, existingLogId) {
      if (!btnEl) return;

      const container = btnEl.parentElement;
      if (container) {
        Array.from(container.children).forEach(child => {
          child.classList.remove('active-present', 'active-absent', 'active-od');
        });
      }

      if (status === 'Present') btnEl.classList.add('active-present');
      else if (status === 'Absent') btnEl.classList.add('active-absent');
      else if (status === 'On Duty') btnEl.classList.add('active-od');

      if (existingLogId) {
        const response = await apiCall(`/api/attendance/${existingLogId}`, {
          method: 'PUT',
          body: { status, remarks: `Period ${period}` }
        });
        if (response.success) {
          showAlert(`Updated status to ${status} for Period ${period}`, 'success');
          await fetchChecklist();
        } else {
          showAlert(response.message, 'danger');
        }
      } else {
        await markQuick(subjectId, period, status);
      }
    }

    async function markQuick(subjectId, period, status) {
      const response = await apiCall('/api/attendance', {
        method: 'POST',
        body: {
          subject_id: subjectId,
          date: currentSelectedDate,
          status: status,
          remarks: `Period ${period}`
        }
      });

      if (response.success) {
        showAlert(`Logged ${status} for Period ${period}`, 'success');
        await fetchChecklist();
      } else {
        showAlert(response.message, 'danger');
      }
    }

    async function deleteMarking(id) {
      const response = await apiCall(`/api/attendance/${id}`, { method: 'DELETE' });
      if (response.success) {
        showAlert('Attendance marking reset', 'success');
        await fetchChecklist();
      } else {
        showAlert(response.message, 'danger');
      }
    }

    window.onload = loadData;
  </script>
</body>

</html>
