<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <style>
    /* Premium style improvements for quick actions */
    .quick-date-btn {
      min-width: 130px;
      transition: all 0.2s ease;
      font-size: 0.8rem !important;
    }
    
    .quick-date-btn.active {
      background: var(--primary) !important;
      border-color: var(--primary) !important;
      color: #ffffff !important;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.15);
    }

    .class-attendance-card {
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .class-attendance-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04) !important;
    }

    @media (min-width: 768px) {
      .class-attendance-card {
        flex-direction: row !important;
        justify-content: space-between;
        align-items: center !important;
      }
    }

    .attendance-btn-group .btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-activity" style="width: 22px; height: 22px; color: #2563eb;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        <span class="fs-4 fw-bold" style="letter-spacing: -0.03em; color: #ffffff;">Trackify</span>
      </div>
      <div class="sidebar-menu">
        <a class="sidebar-link" href="/student/dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-grid"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a class="sidebar-link" href="/student/timetable">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-calendar"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>Timetable</span>
        </a>
        <a class="sidebar-link active" href="/student/attendance">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-check-square"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          <span>Mark</span>
        </a>
        <a class="sidebar-link" href="/student/history">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-clock"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <span>History</span>
        </a>
        <a class="sidebar-link" href="/student/calculator">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-trending-up"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
          <span>Forecaster</span>
        </a>
        <a class="sidebar-link" href="/student/settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sliders"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
          <span>Settings</span>
        </a>
        <a class="sidebar-link logout-link" href="#" onclick="handleLogout()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-log-out"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          <span>Log Out</span>
        </a>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="app-main-wrapper">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-header-title">Mark Attendance</h1>
        <div class="app-header-profile">
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-primary text-white d-flex align-items-center justify-content-center fw-bold fs-7" style="width: 32px; height: 32px; border-radius: 8px;">S</span>
            <div class="text-start d-none d-md-block" style="line-height: 1.1;">
              <div class="fw-bold text-dark fs-7" id="user-header-name">Student</div>
              <div class="text-secondary small" style="font-size: 0.65rem;">Student Profile</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="app-content animate-fade-in-up">
        <!-- Sub-header description -->
        <p class="text-secondary small mb-4">Log your presence for scheduled classes dynamically by selecting dates or shortcuts.</p>

        <div class="row g-4">
          <!-- Scheduled Classes Checklist -->
          <div class="col-lg-12">
            <div class="glass-card border-glass">
              
              <!-- Quick Date Selection & Custom Picker -->
              <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
                <div class="d-flex gap-2 flex-wrap" id="quick-dates-container">
                  <button type="button" class="btn btn-glass quick-date-btn py-2" id="btn-yesterday" onclick="selectRelativeDate(-1)">
                    <div class="text-muted small fs-9">Yesterday</div>
                    <div class="fw-bold" id="lbl-yesterday">-</div>
                  </button>
                  <button type="button" class="btn btn-glass quick-date-btn py-2" id="btn-today" onclick="selectRelativeDate(0)">
                    <div class="text-muted small fs-9">Today</div>
                    <div class="fw-bold" id="lbl-today">-</div>
                  </button>
                  <button type="button" class="btn btn-glass quick-date-btn py-2" id="btn-tomorrow" onclick="selectRelativeDate(1)">
                    <div class="text-muted small fs-9">Tomorrow</div>
                    <div class="fw-bold" id="lbl-tomorrow">-</div>
                  </button>
                </div>
                
                <div class="d-flex align-items-center gap-2">
                  <span class="text-secondary small fw-semibold">Custom Date:</span>
                  <input type="date" class="form-control form-control-sm border-light fw-bold px-2 py-1.5" style="width: 160px; font-size: 0.8rem;" id="attendanceDateSelect" onchange="onDateChanged(this.value)">
                </div>
              </div>

              <!-- Day Progress Tracker -->
              <div class="p-3 bg-light rounded-4 border mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                  <div class="fw-bold text-dark fs-7" id="progress-date-title">Date Schedule</div>
                  <div class="text-secondary small" style="font-size: 0.75rem;" id="progress-text">Loading checklist parameters...</div>
                </div>
                <div class="d-flex align-items-center gap-3">
                  <div class="progress" style="width: 140px; height: 8px; border-radius: 4px; background: #e2e8f0;">
                    <div class="progress-bar bg-primary" id="checklist-progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <span class="fw-bold text-dark small" id="progress-percentage">0%</span>
                </div>
              </div>
              
              <!-- Checklist Cards container -->
              <div id="today-schedule-container">
                <div class="text-center py-5">
                  <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentSelectedDate = '';
    
    // Initialize dates
    const todayObj = new Date();
    const todayDateFormatted = getFormattedDateString(todayObj);
    currentSelectedDate = todayDateFormatted;

    function getFormattedDateString(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatShortDate(date) {
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${days[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
    }

    // Initialize date labels
    function initDateLabels() {
      const yesterday = new Date();
      yesterday.setDate(todayObj.getDate() - 1);
      
      const tomorrow = new Date();
      tomorrow.setDate(todayObj.getDate() + 1);

      document.getElementById('lbl-yesterday').innerText = formatShortDate(yesterday);
      document.getElementById('lbl-today').innerText = formatShortDate(todayObj);
      document.getElementById('lbl-tomorrow').innerText = formatShortDate(tomorrow);
    }

    async function loadData() {
      initDateLabels();
      updateQuickButtonActiveState();

      // Fetch user profile session
      const meResult = await apiCall('/api/auth/me');
      if (meResult.success && meResult.user) {
        document.getElementById('user-header-name').innerText = meResult.user.name;
      } else {
        window.location.href = '/login';
        return;
      }

      await fetchChecklist();
    }

    // Update active quick shortcut highlighting
    function updateQuickButtonActiveState() {
      document.getElementById('attendanceDateSelect').value = currentSelectedDate;

      const yesterday = new Date();
      yesterday.setDate(todayObj.getDate() - 1);
      const yesterdayStr = getFormattedDateString(yesterday);

      const tomorrow = new Date();
      tomorrow.setDate(todayObj.getDate() + 1);
      const tomorrowStr = getFormattedDateString(tomorrow);

      const btnYes = document.getElementById('btn-yesterday');
      const btnTod = document.getElementById('btn-today');
      const btnTom = document.getElementById('btn-tomorrow');

      // Clear all active classes
      btnYes.classList.remove('active');
      btnTod.classList.remove('active');
      btnTom.classList.remove('active');

      if (currentSelectedDate === yesterdayStr) {
        btnYes.classList.add('active');
      } else if (currentSelectedDate === todayDateFormatted) {
        btnTod.classList.add('active');
      } else if (currentSelectedDate === tomorrowStr) {
        btnTom.classList.add('active');
      }
    }

    // Select relative dates (shortcuts)
    async function selectRelativeDate(offset) {
      const d = new Date();
      d.setDate(todayObj.getDate() + offset);
      currentSelectedDate = getFormattedDateString(d);
      updateQuickButtonActiveState();
      await fetchChecklist();
    }

    // Load classes checklist based on selected date
    async function fetchChecklist() {
      const container = document.getElementById('today-schedule-container');
      const dParts = currentSelectedDate.split('-');
      const targetDate = new Date(parseInt(dParts[0], 10), parseInt(dParts[1], 10) - 1, parseInt(dParts[2], 10));

      const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const targetDayName = daysOfWeek[targetDate.getDay()];

      // Update date title inside status bar
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('progress-date-title').innerText = `${targetDayName}, ${months[targetDate.getMonth()]} ${targetDate.getDate()}, ${targetDate.getFullYear()}`;

      // Fetch student's timetable schedule, adjustments, and log entries for the selected date
      const timetableRes = await apiCall('/api/timetable');
      const adjustmentsRes = await apiCall(`/api/timetable/adjustments?date=${currentSelectedDate}`);
      const logsRes = await apiCall(`/api/attendance?startDate=${currentSelectedDate}&endDate=${currentSelectedDate}`);
      
      if (timetableRes.success && adjustmentsRes.success && logsRes.success) {
        const rawSlots = timetableRes.timetable.filter(s => s.day === targetDayName);
        const dayLogs = logsRes.logs;
        const dayAdjustments = adjustmentsRes.adjustments;

        // Apply cohort adjustments to the template slots
        let daySlots = [];
        rawSlots.forEach(slot => {
          const adj = dayAdjustments.find(a => a.period === slot.period && a.adjustment_type !== 'extra');
          if (adj) {
            if (adj.adjustment_type === 'cancel') {
              daySlots.push({
                ...slot,
                is_canceled: true
              });
            } else if (adj.adjustment_type === 'substitution') {
              daySlots.push({
                ...slot,
                subject_id: adj.adjusted_subject_id,
                subject_name: adj.adjusted_subject_name,
                subject_code: adj.adjusted_subject_code,
                color: adj.adjusted_subject_color || slot.color,
                is_substituted: true,
                original_subject_name: slot.subject_name
              });
            } else if (adj.adjustment_type === 'swap') {
              daySlots.push({
                ...slot,
                subject_id: adj.adjusted_subject_id,
                subject_name: adj.adjusted_subject_name,
                subject_code: adj.adjusted_subject_code,
                color: adj.adjusted_subject_color || slot.color,
                is_swapped: true,
                swap_period_details: adj.remarks
              });
            }
          } else {
            daySlots.push(slot);
          }
        });

        // Add extra class periods
        dayAdjustments.forEach(adj => {
          if (adj.adjustment_type === 'extra') {
            daySlots.push({
              id: null,
              subject_id: adj.adjusted_subject_id,
              subject_name: adj.adjusted_subject_name,
              subject_code: adj.adjusted_subject_code,
              color: adj.adjusted_subject_color || '#3b82f6',
              day: targetDayName,
              period: adj.period,
              start_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[0].trim() + ':00' : '00:00:00',
              end_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[1].trim() + ':00' : '00:00:00',
              room: 'TBA',
              is_extra: true
            });
          }
        });

        // Sort by period number
        daySlots.sort((a, b) => a.period - b.period);

        container.innerHTML = '';

        if (daySlots.length === 0) {
          container.innerHTML = `
            <div class="text-center py-5">
              <h3 class="h6 fw-semibold text-secondary">No classes scheduled for this date</h3>
              <p class="text-muted small mb-0">Enjoy your day off or select another date.</p>
            </div>
          `;
          updateProgressBar(0, 0);
          return;
        }

        let markedCount = 0;
        let activeTotal = 0;

        daySlots.forEach(slot => {
          const start = slot.start_time.substring(0, 5);
          const end = slot.end_time.substring(0, 5);

          if (slot.is_canceled) {
            container.innerHTML += `
              <div class="p-3 mb-3 rounded-4 border bg-light text-muted gap-3 class-attendance-card" style="border-left: 5px solid #e2e8f0 !important; text-decoration: line-through; opacity: 0.65;">
                <div class="d-flex justify-content-between align-items-center w-100 flex-wrap">
                  <div>
                    <span class="badge bg-secondary text-white px-2 py-0.5 fs-9 mb-1">Period ${slot.period}</span>
                    <h3 class="fs-6 fw-bold mb-1">${slot.subject_name} (${slot.subject_code})</h3>
                    <div class="text-secondary small">Time: ${start} - ${end} | Canceled Class</div>
                  </div>
                  <div class="text-start text-md-end mt-2 mt-md-0">
                    <span class="badge bg-danger-subtle text-danger border border-danger-subtle px-3 py-2 fs-7">CANCELED</span>
                  </div>
                </div>
              </div>
            `;
            return;
          }

          activeTotal++; // Only count non-canceled classes in checklist progress
          
          // Match log precisely by period
          const matchLog = dayLogs.find(l => {
            if (!l.remarks) return false;
            const parts = l.remarks.split(' ');
            return parts[0] === 'Period' && parts[1] === String(slot.period);
          });

          let statusAreaHtml = '';
          let cardBgStyle = '';

          if (matchLog) {
            markedCount++;
            let badgeClass = 'badge-present';
            
            if (matchLog.status === 'Absent') {
              badgeClass = 'badge-absent';
              cardBgStyle = 'background: rgba(239, 68, 68, 0.02);';
            } else if (matchLog.status === 'Present') {
              cardBgStyle = 'background: rgba(16, 185, 129, 0.02);';
            } else if (matchLog.status === 'Medical Leave') {
              badgeClass = 'bg-warning-subtle text-warning border border-warning-subtle';
              cardBgStyle = 'background: rgba(245, 158, 11, 0.02);';
            } else if (matchLog.status === 'Holiday') {
              badgeClass = 'bg-info-subtle text-info border border-info-subtle';
            } else if (matchLog.status === 'On Duty') {
              badgeClass = 'bg-primary-subtle text-primary border border-primary-subtle';
              cardBgStyle = 'background: rgba(37, 99, 235, 0.02);';
            }

            statusAreaHtml = `
              <div class="d-flex align-items-center gap-2">
                <span class="badge ${badgeClass} px-3 py-2 fs-7">${matchLog.status}</span>
                <button onclick="deleteMarking('${matchLog.id}')" class="btn btn-glass btn-sm border-secondary text-secondary py-1.5 px-3 fs-8 fw-semibold" title="Reset marking">Reset</button>
              </div>
            `;
          } else {
            statusAreaHtml = `
              <div class="d-flex gap-1 flex-wrap justify-content-md-end attendance-btn-group">
                <button onclick="markQuick('${slot.subject_id}', '${slot.period}', 'Present')" class="btn btn-sm btn-outline-success px-3">Present</button>
                <button onclick="markQuick('${slot.subject_id}', '${slot.period}', 'Absent')" class="btn btn-sm btn-outline-danger px-3">Absent</button>
                <button onclick="markQuick('${slot.subject_id}', '${slot.period}', 'On Duty')" class="btn btn-sm btn-outline-primary px-3">OD</button>
                <button onclick="markQuick('${slot.subject_id}', '${slot.period}', 'Medical Leave')" class="btn btn-sm btn-outline-warning px-3">ML</button>
                <button onclick="markQuick('${slot.subject_id}', '${slot.period}', 'Holiday')" class="btn btn-sm btn-outline-info px-3">Holiday</button>
              </div>
            `;
          }

          let subLabel = '';
          if (slot.is_substituted) {
            subLabel = `<div class="text-warning small" style="font-size:0.75rem; font-weight: 500;">★ Substituted from ${slot.original_subject_name}</div>`;
          } else if (slot.is_swapped) {
            subLabel = `<div class="text-info small" style="font-size:0.75rem; font-weight: 500;">⇆ ${slot.swap_period_details}</div>`;
          } else if (slot.is_extra) {
            subLabel = `<div class="text-success small" style="font-size:0.75rem; font-weight: 500;">✚ Extra Period</div>`;
          }

          container.innerHTML += `
            <div class="p-3 mb-3 rounded-4 border bg-white shadow-sm gap-3 class-attendance-card" style="border-left: 5px solid ${slot.color} !important; ${cardBgStyle}">
              <div>
                <span class="badge text-white px-2 py-0.5 fs-9 mb-1" style="background-color: ${slot.color};">Period ${slot.period}</span>
                <h3 class="fs-6 fw-bold mb-1">${slot.subject_name} <span class="text-secondary small font-monospace">(${slot.subject_code})</span></h3>
                <div class="text-secondary small mb-1">Time: ${start} - ${end} ${slot.room ? `| Room: ${slot.room}` : ''}</div>
                ${subLabel}
              </div>
              <div class="text-start text-md-end mt-2 mt-md-0">
                ${statusAreaHtml}
              </div>
            </div>
          `;
        });

        updateProgressBar(markedCount, activeTotal);
      } else {
        container.innerHTML = '<div class="text-danger p-3 text-center">Failed to load schedule checklist.</div>';
      }
    }

    function updateProgressBar(marked, total) {
      const percentage = total > 0 ? Math.round((marked / total) * 100) : 0;
      
      document.getElementById('checklist-progress-bar').style.width = `${percentage}%`;
      document.getElementById('checklist-progress-bar').setAttribute('aria-valuenow', percentage);
      document.getElementById('progress-percentage').innerText = `${percentage}%`;
      document.getElementById('progress-text').innerText = `You have marked ${marked} of ${total} classes scheduled for this date.`;
    }

    async function onDateChanged(dateVal) {
      currentSelectedDate = dateVal;
      updateQuickButtonActiveState();
      await fetchChecklist();
    }

    async function markQuick(subjectId, period, status) {
      const response = await apiCall('/api/attendance', {
        method: 'POST',
        body: {
          subject_id: subjectId,
          date: currentSelectedDate,
          status: status,
          remarks: `Period ${period}`
        }
      });

      if (response.success) {
        showAlert(`Logged ${status} for Period ${period}`, 'success');
        await fetchChecklist();
      } else {
        showAlert(response.message, 'danger');
      }
    }

    async function deleteMarking(id) {
      const response = await apiCall(`/api/attendance/${id}`, { method: 'DELETE' });
      if (response.success) {
        showAlert('Attendance marking reset', 'success');
        await fetchChecklist();
      } else {
        showAlert(response.message, 'danger');
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
