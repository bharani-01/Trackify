<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* State-of-the-art UI customization inspired by Stripe & Apple */
    body {
      background-color: #f8fafc;
      color: #0f172a;
    }
    
    .app-main-wrapper {
      background-color: #fafbfc;
    }
    
    .glass-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.03), 0 1px 2px 0 rgba(0, 0, 0, 0.02);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .glass-card:hover {
      box-shadow: 0 4px 12px 0 rgba(15, 23, 42, 0.05);
      border-color: #cbd5e1;
    }

    /* Sidebar link enhancements */
    .sidebar-link {
      gap: 0.875rem !important;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      color: #94a3b8;
    }
    
    .sidebar-link svg {
      width: 18px;
      height: 18px;
      stroke-width: 2px;
      flex-shrink: 0;
    }
    
    .sidebar-link.active {
      background-color: #2563eb !important;
      color: #ffffff !important;
    }

    .sidebar-link:hover:not(.active) {
      background-color: #1e293b;
      color: #ffffff;
    }

    /* Table styling for subject directory */
    .subject-table-wrapper {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.02), 0 1px 2px 0 rgba(0, 0, 0, 0.01);
    }
    
    .subject-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
    }
    
    .subject-table th {
      background: #f8fafc;
      color: #475569;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    
    .subject-table td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
      color: #334155;
    }
    
    .subject-table tbody tr {
      transition: background-color 0.15s ease;
    }
    
    .subject-table tbody tr:hover {
      background-color: #f8fafc;
    }
    
    .subject-table tbody tr:last-child td {
      border-bottom: none;
    }
    
    .subject-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }
    
    .subject-code-badge {
      display: inline-block;
      align-self: flex-start;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .subject-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0;
    }

    .table-responsive::-webkit-scrollbar {
      height: 5px;
    }
    
    .table-responsive::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    
    .table-responsive::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    /* Expandable detailed row styles */
    .mobile-detail-row {
      display: none !important;
    }

    @media (max-width: 768px) {
      .subject-table th:nth-child(2),
      .subject-table td:nth-child(2),
      .subject-table th:nth-child(3),
      .subject-table td:nth-child(3),
      .subject-table th:nth-child(4),
      .subject-table td:nth-child(4),
      .subject-table th:nth-child(5),
      .subject-table td:nth-child(5) {
        display: none !important;
      }
      
      .subject-table-wrapper {
        overflow-x: hidden !important;
      }
      
      .subject-table th, 
      .subject-table td {
        padding: 0.85rem 0.75rem !important;
      }

      .subject-table th:nth-child(1),
      .subject-table td:nth-child(1) {
        width: auto !important;
        min-width: 0 !important;
      }
      
      .subject-table th:nth-child(6),
      .subject-table td:nth-child(6) {
        width: auto !important;
        min-width: 0 !important;
        text-align: right !important;
        padding-right: 0.75rem !important;
      }

      .subject-name {
        font-size: 0.9rem;
        max-width: 100% !important;
        white-space: normal !important;
      }
      
      .percentage-val {
        font-size: 1.25rem !important;
      }

      .subject-row {
        cursor: pointer;
        user-select: none;
      }

      .subject-row:hover {
        background-color: rgba(37, 99, 235, 0.04) !important;
      }

      .mobile-detail-row {
        display: none; /* Controlled dynamically by JS, but allows table-row on toggle */
      }

      .mobile-detail-panel {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
        padding: 1rem 0.75rem;
        background-color: #f8fafc;
        border-top: 1px solid #e2e8f0;
        border-bottom: 1px solid #e2e8f0;
      }

      .detail-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .detail-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 0.25rem;
      }

      .detail-item .mono-stat {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.9rem;
        font-weight: 700;
      }
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-activity" style="width: 22px; height: 22px; color: #2563eb;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        <span class="fs-4 fw-bold" style="letter-spacing: -0.03em; color: #ffffff;">Trackify</span>
      </div>
      <div class="sidebar-menu">
        <a class="sidebar-link active" href="/student/dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-grid"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          <span>Dashboard</span>
        </a>
        <a class="sidebar-link" href="/student/attendance">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-check-square"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          <span>Attendance</span>
        </a>
        <a class="sidebar-link" href="/student/timetable">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-calendar"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>Academics</span>
        </a>
        <a class="sidebar-link" href="/student/settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <span>Profile</span>
        </a>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="app-main-wrapper">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-header-title">Student Dashboard</h1>
        <div class="app-header-profile dropdown">
          <div class="d-flex align-items-center gap-2" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
            <div class="profile-avatar-container">
              <span class="badge bg-primary text-white d-flex align-items-center justify-content-center fw-bold fs-6" style="width: 36px; height: 36px; border-radius: 50%;">S</span>
            </div>
            <div class="text-start d-none d-md-block" style="line-height: 1.1;">
              <div class="fw-bold text-dark fs-7" id="user-header-name">Student</div>
              <div class="text-secondary small" style="font-size: 0.65rem;">Student Profile</div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-secondary ms-1 d-none d-md-block" style="width: 14px; height: 14px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <ul class="dropdown-menu dropdown-menu-end shadow border-glass rounded-4 mt-2 py-2" style="min-width: 180px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px); border: 1px solid rgba(226,232,240,0.8);">
            <li>
              <a class="dropdown-item py-2 px-3 fw-semibold text-dark d-flex align-items-center gap-2" href="/student/settings">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary" style="width: 16px; height: 16px;"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                <span>Settings</span>
              </a>
            </li>
            <li><hr class="dropdown-divider" style="border-color: #f1f5f9;"></li>
            <li>
              <a class="dropdown-item py-2 px-3 fw-semibold text-danger d-flex align-items-center gap-2" href="#" onclick="handleLogout()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-danger" style="width: 16px; height: 16px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span>Log Out</span>
              </a>
            </li>
          </ul>
        </div>
      </header>

      <!-- Content -->
      <main class="app-content animate-fade-in-up">
        <!-- Welcome Header -->
        <div class="mb-4">
          <h1 class="fw-bold mb-1" style="font-size: 2.25rem; letter-spacing: -0.03em; color: #0f172a;">Hello, <span id="welcome-name">Student</span>!</h1>
          <p class="text-muted" style="font-size: 0.875rem;" id="welcome-details">CSE | Semester 1</p>
        </div>

        <!-- Subject-wise Attendance Table -->
        <div class="section-separator d-flex justify-content-between align-items-center">
          <span>Subject Directory & Performance</span>
          <span class="text-muted small d-none d-md-block" style="font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; text-transform: none; letter-spacing: 0;">Real-time Attendance Analytics</span>
        </div>
        <div class="subject-table-wrapper table-responsive mb-4">
          <table class="subject-table">
            <thead>
              <tr>
                <th style="min-width: 220px;">Subject</th>
                <th class="text-center" style="width: 120px;">Conducted</th>
                <th class="text-center" style="width: 120px;">Present</th>
                <th class="text-center" style="width: 100px;">OD</th>
                <th class="text-center" style="width: 120px;">Absent</th>
                <th class="text-end" style="min-width: 150px; padding-right: 2rem;">Attendance</th>
              </tr>
            </thead>
            <tbody id="subject-table-body">
              <tr>
                <td colspan="6" class="text-center py-4 text-secondary small">Loading subject stats...</td>
              </tr>
            </tbody>
          </table>
        </div>

    </div>
  </div>

  <!-- Global scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="/assets/js/main.js"></script>
  <script>
    let myChart = null;

    async function loadDashboard() {
      // 1. Fetch profile info
      const meResult = await apiCall('/api/auth/me');
      if (meResult.success && meResult.user) {
        const user = meResult.user;
        document.getElementById('user-header-name').innerText = user.name;
        document.getElementById('welcome-name').innerText = user.name;
        document.getElementById('welcome-details').innerText = `${user.department || 'General'} | Semester ${user.semester || 'N/A'}`;
        window.currentUser = user;
      } else {
        window.location.href = '/login';
        return;
      }

      // 2. Fetch stats
      const statsResult = await apiCall('/api/attendance/stats');
      if (statsResult.success) {
        const stats = statsResult.stats;
        
        // Update welcome details
        const user = window.currentUser || { department: 'General', semester: 'N/A' };
        document.getElementById('welcome-details').innerText = `${user.department || 'General'} | Semester ${user.semester || 'N/A'}`;

        // Build Subject-wise rows inside table tbody
        const tbody = document.getElementById('subject-table-body');
        tbody.innerHTML = '';

        if (!stats.subjectStats || stats.subjectStats.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="6" class="text-center py-5 text-secondary small">
                No subjects registered yet.
              </td>
            </tr>
          `;
        } else {
          stats.subjectStats.forEach(subj => {
            const percentage = parseFloat(subj.percentage);
            
            // Dynamic text color thresholds:
            // < 80% => Red (#dc2626)
            // 80% - 90% => Amber/Yellow (#d97706)
            // > 90% => Emerald Green (#059669)
            let percentColor = '#059669';
            if (percentage < 80) {
              percentColor = '#dc2626';
            } else if (percentage <= 90) {
              percentColor = '#d97706';
            }

            // Using unified primary brand color #2563eb for code badge
            const primaryColor = '#2563eb';

            tbody.innerHTML += `
              <tr class="animate-fade-in-up subject-row" onclick="toggleMobileRow(this)">
                <td>
                  <div class="subject-info">
                    <span class="subject-code-badge" style="background-color: rgba(37, 99, 235, 0.08); color: ${primaryColor};">${subj.subject_code}</span>
                    <h3 class="subject-name" title="${subj.subject_name}">${subj.subject_name}</h3>
                  </div>
                </td>
                <td class="text-center fw-semibold text-dark">${subj.conducted_count}</td>
                <td class="text-center fw-semibold text-success">${subj.present_count}</td>
                <td class="text-center fw-semibold text-primary">${subj.od_count || 0}</td>
                <td class="text-center fw-semibold text-danger">${subj.absent_count}</td>
                <td class="text-end" style="padding-right: 2rem;">
                  <span class="percentage-val" style="color: ${percentColor}; font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em;">${subj.percentage}%</span>
                </td>
              </tr>
              <tr class="mobile-detail-row" style="display: none;">
                <td colspan="6" style="padding: 0 !important;">
                  <div class="mobile-detail-panel">
                    <div class="detail-item">
                      <span class="detail-label">Conducted</span>
                      <span class="mono-stat text-dark">${subj.conducted_count}</span>
                    </div>
                    <div class="detail-item">
                      <span class="detail-label">Present</span>
                      <span class="mono-stat text-success">${subj.present_count}</span>
                    </div>
                    <div class="detail-item">
                      <span class="detail-label">OD</span>
                      <span class="mono-stat text-primary">${subj.od_count || 0}</span>
                    </div>
                    <div class="detail-item">
                      <span class="detail-label">Absent</span>
                      <span class="mono-stat text-danger">${subj.absent_count}</span>
                    </div>
                  </div>
                </td>
              </tr>
            `;
          });
        }

        // Render Chart.js using unified primary brand color
        const chartEl = document.getElementById('subjectChart');
        if (chartEl) {
          const labels = stats.subjectStats.map(s => s.subject_code);
          const data = stats.subjectStats.map(s => s.percentage);
          const colors = stats.subjectStats.map(() => '#2563eb');

          const ctx = chartEl.getContext('2d');
          if (myChart) myChart.destroy();

          myChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{
                label: 'Attendance %',
                data: data,
                backgroundColor: colors,
                borderRadius: 6,
                borderWidth: 0,
                maxBarThickness: 28
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#1e293b',
                  titleFont: { family: 'Outfit', size: 12, weight: 'bold' },
                  bodyFont: { family: 'Outfit', size: 12 },
                  padding: 10,
                  cornerRadius: 8,
                  displayColors: false
                }
              },
              scales: {
                y: {
                  min: 0,
                  max: 100,
                  grid: {
                    color: '#f1f5f9',
                    drawTicks: false
                  },
                  border: {
                    dash: [5, 5],
                    display: false
                  },
                  ticks: {
                    font: { family: 'Outfit', size: 10, weight: '500' },
                    color: '#64748b',
                    padding: 8
                  }
                },
                x: {
                  grid: { display: false },
                  border: { display: false },
                  ticks: {
                    font: { family: 'Outfit', size: 10, weight: '600' },
                    color: '#475569',
                    padding: 8
                  }
                }
              }
            }
          });
        }
      }

      // 3. Fetch Today's schedule list
      const scheduleContainer = document.getElementById('today-schedule-stub');
      if (scheduleContainer) {
        const today = new Date();
        const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const todayDayName = daysOfWeek[today.getDay()];
        const todayDateFormatted = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        const timetableRes = await apiCall('/api/timetable');
        const adjustmentsRes = await apiCall(`/api/timetable/adjustments?date=${todayDateFormatted}`);
        const logsRes = await apiCall(`/api/attendance?startDate=${todayDateFormatted}&endDate=${todayDateFormatted}`);

        if (timetableRes.success && adjustmentsRes.success && logsRes.success) {
          const rawSlots = timetableRes.timetable.filter(s => s.day === todayDayName);
          const todayLogs = logsRes.logs;
          const dayAdjustments = adjustmentsRes.adjustments;

          // Apply adjustments
          let todaySlots = [];
          rawSlots.forEach(slot => {
            const adj = dayAdjustments.find(a => a.period === slot.period && a.adjustment_type !== 'extra');
            if (adj) {
              if (adj.adjustment_type === 'cancel') {
                todaySlots.push({
                  ...slot,
                  is_canceled: true
                });
              } else if (adj.adjustment_type === 'substitution') {
                todaySlots.push({
                  ...slot,
                  subject_id: adj.adjusted_subject_id,
                  subject_name: adj.adjusted_subject_name,
                  subject_code: adj.adjusted_subject_code,
                  color: adj.adjusted_subject_color || slot.color,
                  is_substituted: true,
                  original_subject_name: slot.subject_name
                });
              } else if (adj.adjustment_type === 'swap') {
                todaySlots.push({
                  ...slot,
                  subject_id: adj.adjusted_subject_id,
                  subject_name: adj.adjusted_subject_name,
                  subject_code: adj.adjusted_subject_code,
                  color: adj.adjusted_subject_color || slot.color,
                  is_swapped: true,
                  swap_period_details: adj.remarks
                });
              }
            } else {
              todaySlots.push(slot);
            }
          });

          // Add extra class periods
          dayAdjustments.forEach(adj => {
            if (adj.adjustment_type === 'extra') {
              todaySlots.push({
                id: null,
                subject_id: adj.adjusted_subject_id,
                subject_name: adj.adjusted_subject_name,
                subject_code: adj.adjusted_subject_code,
                color: adj.adjusted_subject_color || '#3b82f6',
                day: todayDayName,
                period: adj.period,
                start_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[0].trim() + ':00' : '00:00:00',
                end_time: adj.remarks && adj.remarks.includes('(') ? adj.remarks.split('(').pop().split(')')[0].split('-')[1].trim() + ':00' : '00:00:00',
                room: 'TBA',
                is_extra: true
              });
            }
          });

          // Sort by period number
          todaySlots.sort((a, b) => a.period - b.period);

          scheduleContainer.innerHTML = '';

          if (todaySlots.length === 0) {
            scheduleContainer.innerHTML = `
              <div class="text-center py-4 text-secondary small">
                No classes scheduled for today.
              </div>
            `;
            return;
          }

          // Limit to first 3 items
          todaySlots.slice(0, 3).forEach(slot => {
            if (slot.is_canceled) {
              scheduleContainer.innerHTML += `
                <div class="d-flex align-items-center gap-3 p-2.5 rounded-3 mb-2 animate-fade-in-up" style="background: #fff5f5; border: 1px solid #fee2e2; opacity: 0.75; width: 100%;">
                  <div class="d-flex flex-column align-items-center justify-content-center px-2 py-1.5 rounded text-white text-center" style="background-color: #dc2626; min-width: 60px; height: 42px;">
                    <span class="fw-bold" style="font-size: 0.75rem; line-height: 1.1;">P${slot.period}</span>
                    <span class="small" style="font-size: 0.55rem; opacity: 0.85; line-height: 1.1;">Canceled</span>
                  </div>
                  <div class="flex-grow-1 min-w-0">
                    <div class="fw-bold text-muted text-truncate text-decoration-line-through" style="font-size: 0.85rem;">${slot.subject_code} - ${slot.subject_name}</div>
                    <div class="text-muted" style="font-size: 0.7rem;">Class Canceled</div>
                  </div>
                  <div><span class="badge bg-danger-subtle text-danger border border-danger-subtle fs-9">Canceled</span></div>
                </div>
              `;
              return;
            }

            // Match log precisely by period
            const matchLog = todayLogs.find(l => {
              if (!l.remarks) return false;
              const parts = l.remarks.split(' ');
              return parts[0] === 'Period' && parts[1] === String(slot.period);
            });

            let statusBadge = `<span class="badge bg-light text-secondary border fs-9" style="font-weight: 500;">Unmarked</span>`;
            
            if (matchLog) {
              let bClass = 'badge-present';
              if (matchLog.status === 'Absent') bClass = 'badge-absent';
              else if (matchLog.status === 'Medical Leave') bClass = 'bg-warning-subtle text-warning border border-warning-subtle';
              else if (matchLog.status === 'Holiday') bClass = 'bg-info-subtle text-info border border-info-subtle';
              else if (matchLog.status === 'On Duty') bClass = 'bg-primary-subtle text-primary border border-primary-subtle';
              statusBadge = `<span class="badge ${bClass} fs-9">${matchLog.status}</span>`;
            }

            let typeLabel = '';
            if (slot.is_substituted) typeLabel = ' (Substituted)';
            else if (slot.is_swapped) typeLabel = ' (Swapped)';
            else if (slot.is_extra) typeLabel = ' (Extra Class)';

            scheduleContainer.innerHTML += `
              <div class="d-flex align-items-center gap-3 p-2.5 rounded-4 mb-2 border bg-white shadow-xs animate-fade-in-up" style="width: 100%;">
                <div class="d-flex align-items-center justify-content-center rounded text-white text-center font-bold" style="background-color: ${slot.color || '#3b82f6'}; min-width: 48px; height: 42px; font-size: 0.85rem; font-weight: 800;">
                  P${slot.period}
                </div>
                <div class="flex-grow-1 min-w-0">
                  <div class="fw-bold text-dark text-truncate" style="font-size: 0.85rem;">${slot.subject_code} - ${slot.subject_name}${typeLabel}</div>
                  <div class="text-muted" style="font-size: 0.7rem;">Room: ${slot.room || 'TBA'}</div>
                </div>
                <div>${statusBadge}</div>
              </div>
            `;
          });

          if (todaySlots.length > 3) {
            scheduleContainer.innerHTML += `
              <div class="text-center mt-2 small">
                <a href="/student/attendance" class="text-decoration-none small fw-semibold">+ ${todaySlots.length - 3} more classes</a>
              </div>
            `;
          }
        } else {
          scheduleContainer.innerHTML = '<div class="text-danger small">Failed to load schedule.</div>';
        }
      }
    }

    function toggleMobileRow(row) {
      if (window.innerWidth > 768) return;
      const detailRow = row.nextElementSibling;
      if (detailRow && detailRow.classList.contains('mobile-detail-row')) {
        const isCurrentlyVisible = detailRow.style.display === 'table-row';
        
        // Close all detail rows first for accordion feel
        document.querySelectorAll('.mobile-detail-row').forEach(r => {
          r.style.display = 'none';
        });
        
        detailRow.style.display = isCurrentlyVisible ? 'none' : 'table-row';
      }
    }

    window.onload = loadDashboard;
  </script>
</body>
</html>
