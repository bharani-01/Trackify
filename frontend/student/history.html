<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance History - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
  <link rel="icon" type="image/webp" href="/assets/images/favicon.webp">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (localStorage.getItem('sidebar-collapsed') === 'true') {
        document.documentElement.classList.add('sidebar-collapsed');
      }
    })();
  </script>
  <!-- PWA Support -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trackify">
  <link rel="apple-touch-icon" href="/assets/images/favicon-192.png">
</head>

<body>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-logo">
        <img src="/assets/images/logo_light.webp" alt="Trackify Logo" style="height: 32px; width: auto;">
      </div>
      <div class="sidebar-menu">
        <a class="sidebar-link" href="/student/dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="feather feather-grid">
            <rect x="3" y="3" width="7" height="9"></rect>
            <rect x="14" y="3" width="7" height="5"></rect>
            <rect x="14" y="12" width="7" height="9"></rect>
            <rect x="3" y="16" width="7" height="5"></rect>
          </svg>
          <span>Dashboard</span>
        </a>
        <a class="sidebar-link active" href="/student/attendance">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="feather feather-check-square">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          <span>Attendance</span>
        </a>
        <a class="sidebar-link" href="/student/timetable">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="feather feather-calendar">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>Time Table</span>
        </a>
        <a class="sidebar-link" href="/student/settings">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="feather feather-user">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span>Profile</span>
        </a>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="app-main-wrapper">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-header-title">Attendance</h1>
        <div class="app-header-profile dropdown">
          <div class="d-flex align-items-center gap-2" data-bs-toggle="dropdown" aria-expanded="false"
            style="cursor: pointer;">
            <div class="profile-avatar-container">
              <span class="badge bg-primary text-white d-flex align-items-center justify-content-center fw-bold fs-6"
                style="width: 36px; height: 36px; border-radius: 50%;">S</span>
            </div>
            <div class="text-start d-none d-md-block" style="line-height: 1.1;">
              <div class="fw-bold text-dark fs-7" id="user-header-name">Student</div>
              <div class="text-secondary small" style="font-size: 0.65rem;">Student Profile</div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="text-secondary ms-1 d-none d-md-block" style="width: 14px; height: 14px;">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <ul class="dropdown-menu dropdown-menu-end shadow border-glass rounded-4 mt-2 py-2"
            style="min-width: 180px; background: var(--bg-secondary); backdrop-filter: blur(8px); border: 1px solid rgba(226,232,240,0.8);">
            <li>
              <a class="dropdown-item py-2 px-3 fw-semibold text-dark d-flex align-items-center gap-2"
                href="/student/settings">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary"
                  style="width: 16px; height: 16px;">
                  <line x1="4" y1="21" x2="4" y2="14"></line>
                  <line x1="4" y1="10" x2="4" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12" y2="3"></line>
                  <line x1="20" y1="21" x2="20" y2="16"></line>
                  <line x1="20" y1="12" x2="20" y2="3"></line>
                  <line x1="1" y1="14" x2="7" y2="14"></line>
                  <line x1="9" y1="8" x2="15" y2="8"></line>
                  <line x1="17" y1="16" x2="23" y2="16"></line>
                </svg>
                <span>Settings</span>
              </a>
            </li>
            <li>
              <hr class="dropdown-divider" style="border-color: #f1f5f9;">
            </li>
            <li>
              <a class="dropdown-item py-2 px-3 fw-semibold text-danger d-flex align-items-center gap-2" href="#"
                onclick="handleLogout()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-danger"
                  style="width: 16px; height: 16px;">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Log Out</span>
              </a>
            </li>
          </ul>
        </div>
      </header>

      <!-- Content -->
      <main class="app-content animate-fade-in-up">
        <!-- Oval Chip Sub-tabs Navigation & Download Action -->
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
          <div class="d-flex align-items-center gap-2">
            <a href="/student/attendance" class="btn btn-sm rounded-pill px-3.5 py-1.5 fw-semibold btn-glass text-secondary">Mark Attendance</a>
          </div>

          <a href="/student/export" class="btn btn-sm btn-glass rounded-pill px-3.5 py-1.5 fw-semibold text-primary border-primary d-inline-flex align-items-center gap-2" title="Export & Download Attendance Reports">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span>Download</span>
          </a>
        </div>

        <!-- Filter controls panel -->
        <div class="glass-card border-glass mb-4 p-3">
          <form id="filterForm" class="row g-2 align-items-center">
            <!-- Subject Filter -->
            <div class="col-md-3">
              <select class="form-select border-light" id="filterSubject">
                <option value="">All Subjects</option>
              </select>
            </div>
            <!-- Start Date -->
            <div class="col-md-3">
              <input type="date" class="form-control border-light" id="filterStart">
            </div>
            <!-- End Date -->
            <div class="col-md-3">
              <input type="date" class="form-control border-light" id="filterEnd">
            </div>
            <!-- Submit -->
            <div class="col-md-3">
              <button type="submit" class="btn btn-glass w-100 border-secondary text-secondary fw-semibold">Apply
                Filters</button>
            </div>
          </form>
        </div>

        <!-- Logs Table -->
        <div class="glass-card border-glass p-0 overflow-hidden shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light border-bottom">
                <tr>
                  <th class="ps-4" style="width: 150px;">Date</th>
                  <th>Subject Details</th>
                  <th style="width: 120px;">Status</th>
                  <th>Remarks / Period</th>
                  <th class="pe-4 text-end" style="width: 180px;">Actions</th>
                </tr>
              </thead>
              <tbody id="logs-container">
                <tr>
                  <td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                      <span class="visually-hidden">Loading...</span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Edit Attendance Log Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-glass p-0 shadow-lg text-start"
        style="background: var(--bg-secondary);">
        <div class="modal-header border-bottom border-light p-4">
          <h5 class="modal-title fw-bold" id="editModalLabel">Edit Attendance Log</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="editForm">
          <input type="hidden" id="editLogId">
          <div class="modal-body p-4">

            <div class="mb-3 p-3 bg-light rounded-4 border">
              <div class="text-secondary small">Subject</div>
              <div class="fs-6 fw-bold" id="editSubjectName">-</div>
            </div>

            <div class="mb-3 p-3 bg-light rounded-4 border">
              <div class="text-secondary small">Date</div>
              <div class="fs-6 fw-bold" id="editLogDate">-</div>
            </div>

            <!-- Status Dropdown -->
            <div class="form-floating mb-3">
              <select class="form-select" id="editStatus" required>
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
                <option value="On Duty">On Duty</option>
                <option value="Medical Leave">Medical Leave</option>
                <option value="Holiday">Holiday</option>
              </select>
              <label for="editStatus">Status</label>
            </div>

            <!-- Remarks -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="editRemarks" placeholder="Optional comments">
              <label for="editRemarks">Remarks</label>
            </div>

          </div>
          <div class="modal-footer border-top border-light p-4">
            <button type="button" class="btn btn-glass" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-glow">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentLogs = [];
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    async function loadData() {
      // Load user profile header
      const meResult = await apiCall('/api/auth/me');
      if (meResult.success && meResult.user) {
        document.getElementById('user-header-name').innerText = meResult.user.name;
      } else {
        window.location.href = '/login';
        return;
      }

      // Load subjects for filter selection (if not already loaded)
      if (document.getElementById('filterSubject').options.length === 1) {
        const subResult = await apiCall('/api/subjects');
        if (subResult.success) {
          const select = document.getElementById('filterSubject');
          subResult.subjects.forEach(sub => {
            select.innerHTML += `<option value="${sub.id}">${sub.subject_code} - ${sub.subject_name}</option>`;
          });
        }
      }

      // Fetch logs
      const subId = document.getElementById('filterSubject').value;
      const start = document.getElementById('filterStart').value;
      const end = document.getElementById('filterEnd').value;

      let url = '/api/attendance?';
      if (subId) url += `subjectId=${subId}&`;
      if (start) url += `startDate=${start}&`;
      if (end) url += `endDate=${end}&`;

      const response = await apiCall(url);
      const container = document.getElementById('logs-container');

      if (response.success) {
        currentLogs = response.logs;
        container.innerHTML = '';

        if (currentLogs.length === 0) {
          container.innerHTML = `
            <tr>
              <td colspan="5" class="text-center py-5 text-secondary">
                No attendance logs found matching filters.
              </td>
            </tr>
          `;
          return;
        }

        currentLogs.forEach((log, idx) => {
          const d = new Date(log.date);
          const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          let badgeClass = 'badge-present';
          if (log.status === 'Absent') badgeClass = 'badge-absent';
          else if (log.status === 'Medical Leave') badgeClass = 'bg-warning-subtle text-warning border border-warning-subtle';
          else if (log.status === 'Holiday') badgeClass = 'bg-info-subtle text-info border border-info-subtle';
          else if (log.status === 'On Duty') badgeClass = 'bg-primary-subtle text-primary border border-primary-subtle';

          container.innerHTML += `
            <tr class="border-bottom">
              <td class="ps-4 fw-semibold">${dateStr}</td>
              <td>
                <div class="d-flex align-items-center">
                  <span style="display:inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: ${log.color}; margin-right: 8px;"></span>
                  <span>${log.subject_name} <span class="text-secondary small">(${log.subject_code})</span></span>
                </div>
              </td>
              <td><span class="badge ${badgeClass} fs-8">${log.status}</span></td>
              <td class="text-secondary small">${log.remarks || '-'}</td>
              <td class="pe-4 text-end">
                <div class="d-flex gap-1 justify-content-end">
                  <button onclick="openEditModal(${idx})" class="btn btn-glass btn-sm py-1 px-2.5" style="font-size: 0.8rem;">Edit</button>
                  <button onclick="deleteLog('${log.id}')" class="btn btn-glass btn-sm border-danger text-danger py-1 px-2.5" style="font-size: 0.8rem;">Delete</button>
                </div>
              </td>
            </tr>
          `;
        });
      } else {
        container.innerHTML = '<tr><td colspan="5" class="text-danger text-center p-3">Failed to load logs.</td></tr>';
      }
    }

    document.getElementById('filterForm').addEventListener('submit', (e) => {
      e.preventDefault();
      loadData();
    });

    function openEditModal(idx) {
      const log = currentLogs[idx];
      const d = new Date(log.date);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      document.getElementById('editLogId').value = log.id;
      document.getElementById('editSubjectName').innerText = log.subject_name;
      document.getElementById('editLogDate').innerText = dateStr;
      document.getElementById('editStatus').value = log.status;
      document.getElementById('editRemarks').value = log.remarks || '';

      editModal.show();
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const id = document.getElementById('editLogId').value;
      const status = document.getElementById('editStatus').value;
      const remarks = document.getElementById('editRemarks').value;

      const response = await apiCall(`/api/attendance/${id}`, {
        method: 'PUT',
        body: { status, remarks }
      });

      if (response.success) {
        editModal.hide();
        showAlert('Attendance log entry updated', 'success');
        loadData();
      } else {
        showAlert(response.message, 'danger');
      }
    });

    async function deleteLog(id) {
      if (confirm('Permanently delete this attendance log? This will update your calculated attendance percentages immediately.')) {
        const response = await apiCall(`/api/attendance/${id}`, { method: 'DELETE' });
        if (response.success) {
          showAlert('Log record deleted successfully', 'success');
          loadData();
        } else {
          showAlert(response.message, 'danger');
        }
      }
    }

    function exportToCSV() {
      if (currentLogs.length === 0) {
        showAlert('No records available to export', 'warning');
        return;
      }

      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Date,Subject Code,Subject Name,Status,Remarks\n";

      currentLogs.forEach(log => {
        const d = new Date(log.date);
        const dateStr = d.toISOString().split('T')[0];
        const row = `"${dateStr}","${log.subject_code}","${log.subject_name}","${log.status}","${log.remarks || ''}"`;
        csvContent += row + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `attendance_history_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.onload = loadData;
  </script>
</body>

</html>
