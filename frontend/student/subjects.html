<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Subjects - Trackify</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/style.css?v=1.2">
</head>
<body>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar">
      <div class="sidebar-logo">
        <span class="fs-4 fw-bold">Trackify</span>
      </div>
      <div class="sidebar-menu">
        <a class="sidebar-link" href="/student/dashboard">Dashboard Overview</a>
        <a class="sidebar-link active" href="/student/subjects">Manage Subjects</a>
        <a class="sidebar-link" href="/student/timetable">Timetable Schedule</a>
        <a class="sidebar-link" href="/student/attendance">Mark Attendance</a>
        <a class="sidebar-link" href="/student/history">Attendance History</a>
        <a class="sidebar-link" href="/student/calculator">Attendance Forecaster</a>
        <a class="sidebar-link" href="/student/settings">Preferences & Target</a>
        <a class="sidebar-link logout-link" href="#" onclick="handleLogout()">Log Out</a>
      </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="app-main-wrapper">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-header-title">Manage Subjects</h1>
        <div class="app-header-profile">
          <div class="d-flex align-items-center gap-2">
            <span class="badge bg-primary text-white d-flex align-items-center justify-content-center fw-bold fs-7" style="width: 32px; height: 32px; border-radius: 8px;">S</span>
            <div class="text-start d-none d-md-block" style="line-height: 1.1;">
              <div class="fw-bold text-dark fs-7" id="user-header-name">Student</div>
              <div class="text-secondary small" style="font-size: 0.65rem;">Student Profile</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="app-content animate-fade-in-up">
        <!-- Header Controls -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
          <div>
            <h2 class="h5 fw-bold mb-1">Your Academic Subjects</h2>
            <p class="text-secondary small mb-0">Create and modify the courses you are tracking.</p>
          </div>
          <button class="btn btn-glow" data-bs-toggle="modal" data-bs-target="#subjectModal" onclick="openAddModal()">
            + Add New Subject
          </button>
        </div>

        <!-- Subjects Grid -->
        <div class="row g-4" id="subjects-container">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Subject Modal -->
  <div class="modal fade" id="subjectModal" tabindex="-1" aria-labelledby="subjectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-glass p-0 shadow-lg text-start" style="background: rgba(255, 255, 255, 0.98);">
        <div class="modal-header border-bottom border-light p-4">
          <h5 class="modal-title fw-bold" id="subjectModalLabel">Add Subject</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="subjectForm">
          <input type="hidden" id="subjectId">
          <div class="modal-body p-4">
            <!-- Subject Name -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="subjectName" placeholder="Computer Programming" required>
              <label for="subjectName">Subject Name</label>
            </div>

            <!-- Subject Code -->
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="subjectCode" placeholder="CS101" required>
              <label for="subjectCode">Subject Code</label>
            </div>

            <!-- Credits -->
            <div class="form-floating mb-3">
              <input type="number" class="form-control" id="credits" placeholder="4" required min="1" max="10" value="3">
              <label for="credits">Credits</label>
            </div>

            <!-- Color Palette selection -->
            <div class="mb-3">
              <label class="form-label text-secondary small fw-bold">Select Color Accent</label>
              <div class="d-flex gap-2 flex-wrap" id="color-palette">
                <button type="button" class="color-btn selected" data-color="#4f46e5" style="background-color: #4f46e5; width: 32px; height: 32px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 0 1px #cbd5e1;"></button>
                <button type="button" class="color-btn" data-color="#ec4899" style="background-color: #ec4899; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
                <button type="button" class="color-btn" data-color="#d946ef" style="background-color: #d946ef; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
                <button type="button" class="color-btn" data-color="#06b6d4" style="background-color: #06b6d4; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
                <button type="button" class="color-btn" data-color="#10b981" style="background-color: #10b981; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
                <button type="button" class="color-btn" data-color="#f59e0b" style="background-color: #f59e0b; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
                <button type="button" class="color-btn" data-color="#3b82f6" style="background-color: #3b82f6; width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;"></button>
              </div>
              <input type="hidden" id="selectedColor" value="#4f46e5">
            </div>
          </div>
          <div class="modal-footer border-top border-light p-4">
            <button type="button" class="btn btn-glass" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-glow" id="saveBtn">Save Subject</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Global scripts -->
  <script src="/assets/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentSubjects = [];
    const subjectModal = new bootstrap.Modal(document.getElementById('subjectModal'));

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.color-btn').forEach(b => {
          b.style.borderColor = 'transparent';
          b.classList.remove('selected');
        });
        e.target.style.borderColor = '#fff';
        e.target.style.boxShadow = '0 0 0 1px #cbd5e1';
        e.target.classList.add('selected');
        document.getElementById('selectedColor').value = e.target.getAttribute('data-color');
      });
    });

    function selectPaletteColor(hexColor) {
      document.querySelectorAll('.color-btn').forEach(b => {
        b.style.borderColor = 'transparent';
        b.style.boxShadow = 'none';
        b.classList.remove('selected');
        if (b.getAttribute('data-color') === hexColor) {
          b.style.borderColor = '#fff';
          b.style.boxShadow = '0 0 0 1px #cbd5e1';
          b.classList.add('selected');
          document.getElementById('selectedColor').value = hexColor;
        }
      });
    }

    function openAddModal() {
      document.getElementById('subjectModalLabel').innerText = 'Add Subject';
      document.getElementById('subjectForm').reset();
      document.getElementById('subjectId').value = '';
      selectPaletteColor('#4f46e5');
    }

    function openEditModal(index) {
      const sub = currentSubjects[index];
      document.getElementById('subjectModalLabel').innerText = 'Edit Subject';
      document.getElementById('subjectId').value = sub.id;
      document.getElementById('subjectName').value = sub.subject_name;
      document.getElementById('subjectCode').value = sub.subject_code;
      document.getElementById('credits').value = sub.credits;
      selectPaletteColor(sub.color);
      subjectModal.show();
    }

    async function loadData() {
      const meResult = await apiCall('/api/auth/me');
      if (meResult.success && meResult.user) {
        document.getElementById('user-header-name').innerText = meResult.user.name;
      } else {
        window.location.href = '/login';
        return;
      }

      const response = await apiCall('/api/subjects');
      const container = document.getElementById('subjects-container');
      
      if (response.success) {
        currentSubjects = response.subjects;
        container.innerHTML = '';

        if (currentSubjects.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center py-5">
              <h3 class="h4">No subjects found</h3>
              <p class="text-secondary mb-0">Get started by creating a subject or check if admin template copies failed.</p>
            </div>
          `;
          return;
        }

        currentSubjects.forEach((sub, idx) => {
          const cardHtml = `
            <div class="col-md-6 col-xl-4">
              <div class="glass-card border-glass position-relative h-100 d-flex flex-column justify-content-between" style="border-left: 5px solid ${sub.color} !important;">
                <div>
                  <div class="d-flex justify-content-between align-items-start mb-3">
                    <span class="badge text-white px-2 py-1 fs-8" style="background-color: ${sub.color};">${sub.subject_code}</span>
                    <span class="text-secondary small fw-semibold">${sub.credits} Credits</span>
                  </div>
                  <h3 class="h5 fw-bold mb-3 text-truncate-2" title="${sub.subject_name}">${sub.subject_name}</h3>
                </div>
                <div class="d-flex gap-2 justify-content-end mt-4 pt-2 border-top border-light">
                  <button onclick="openEditModal(${idx})" class="btn btn-glass btn-sm py-1.5 px-3">Edit</button>
                  <button onclick="deleteSubject('${sub.id}')" class="btn btn-glass btn-sm border-danger text-danger py-1.5 px-3">Delete</button>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += cardHtml;
        });
      } else {
        container.innerHTML = '<div class="col-12 text-danger text-center p-3">Failed to load subjects.</div>';
      }
    }

    document.getElementById('subjectForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('subjectId').value;
      const subject_name = document.getElementById('subjectName').value;
      const subject_code = document.getElementById('subjectCode').value;
      const credits = document.getElementById('credits').value;
      const color = document.getElementById('selectedColor').value;

      let response;
      if (id) {
        response = await apiCall(`/api/subjects/${id}`, {
          method: 'PUT',
          body: { subject_name, subject_code, credits, color }
        });
      } else {
        response = await apiCall('/api/subjects', {
          method: 'POST',
          body: { subject_name, subject_code, credits, color }
        });
      }

      if (response.success) {
        subjectModal.hide();
        showAlert(id ? 'Subject updated' : 'Subject created', 'success');
        loadData();
      } else {
        showAlert(response.message, 'danger');
      }
    });

    async function deleteSubject(id) {
      if (confirm('Are you sure you want to delete this subject? All associated timetable entries and attendance records will be permanently removed!')) {
        const response = await apiCall(`/api/subjects/${id}`, { method: 'DELETE' });
        if (response.success) {
          showAlert('Subject and records deleted successfully', 'success');
          loadData();
        } else {
          showAlert(response.message, 'danger');
        }
      }
    }

    window.onload = loadData;
  </script>
</body>
</html>
